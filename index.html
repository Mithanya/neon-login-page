<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Gradient Login | Animated Border</title>
    <!-- Font Awesome 6 (for icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #252432;
        }

        /* Custom property for rotating angle */
        @property --a {
            syntax: '<angle>';
            inherits: false;
            initial-value: 0deg;
        }

        /* Main container */
        .box {
            position: relative;
            width: 400px;
            height: 200px;
            background: repeating-conic-gradient(from var(--a), #ff2778 0%, #ff2770 5%, transparent 5%, transparent 40%, #ff2770 50%);
            filter: drop-shadow(0 15px 50px #000);
            animation: rotate 4s linear infinite;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: height 0.5s ease, width 0.5s ease;
        }

        .box:hover {
            width: 450px;
            height: 500px;
        }

        @keyframes rotate {
            0% { --a: 0deg; }
            100% { --a: 360deg; }
        }

        /* Second gradient layer */
        .box::before {
            content: '';
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: repeating-conic-gradient(from var(--a), #45f3ff 0%, #45f3ff 5%, transparent 5%, transparent 40%, #45f3ff 50%);
            filter: drop-shadow(0 15px 50px);
            border-radius: 20px;
            animation: rotate 4s linear infinite;
            animation-delay: -1s;
        }

        /* Inner dark background */
        .box::after {
            content: '';
            position: absolute;
            inset: 4px;
            background: #2b2b39;
            border-radius: 15px;
            border: solid #25252b;
        }

        /* Login content area */
        .login {
            position: absolute;
            inset: 60px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            box-shadow: inset 0 10px 20px rgba(0, 0, 0, 0.5);
            color: #fff;
            overflow: hidden;
            transition: inset 0.5s ease;
        }

        .box:hover .login {
            inset: 40px;
        }

        .loginbx {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            width: 70%;
            transform: translateY(126px);
            transition: transform 0.5s ease;
        }

        .box:hover .loginbx {
            transform: translateY(0);
        }

        .loginbx h2 {
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 600;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .loginbx h2 i {
            color: #ff2770;
            text-shadow: 0 0 5px #ff2770, 0 0 30px #ff2770;
        }

        .loginbx input {
            width: 100%;
            padding: 10px 20px;
            outline: none;
            font-size: 1em;
            color: #111;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 30px;
            transition: 0.2s;
        }

        .loginbx input::placeholder {
            color: #999;
        }

        .loginbx input[type="submit"] {
            background: #45f3ff;
            font-weight: 600;
            color: #111;
            cursor: pointer;
            transition: 0.3s;
        }

        .loginbx input[type="submit"]:hover {
            box-shadow: 0 0 10px #45f3ff, 0 0 60px #45f3ff;
            background: #6effff;
        }

        .group {
            display: flex;
            width: 100%;
            justify-content: space-between;
            margin-top: 8px;
        }

        .group a {
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .group a:nth-child(2) {
            color: #ff2770;
            font-weight: 600;
        }

        .group a:hover {
            text-decoration: underline;
        }

        /* Responsive adjustments */
        @media (max-width: 500px) {
            .box {
                width: 320px;
                height: 180px;
            }
            .box:hover {
                width: 360px;
                height: 480px;
            }
            .loginbx h2 {
                font-size: 1.1rem;
                letter-spacing: 0.1em;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="login">
            <div class="loginbx">
                <h2>
                    <i class="fa-solid fa-right-to-bracket"></i>
                    login
                    <i class="fa-solid fa-heart"></i>
                </h2>
                <input type="text" placeholder="username">
                <input type="password" placeholder="password">
                <input type="submit" value="sign in">
                <div class="group">
                    <a href="#">forget password</a>
                    <a href="#">sign up</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
